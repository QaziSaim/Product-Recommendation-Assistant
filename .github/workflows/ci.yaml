name: FastAPI CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Upgraded to v6 for native Node 24 support
    - name: Checkout Code
      uses: actions/checkout@v6

    # Upgraded to v4 for native Node 24 support
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    # Build the Docker image
    - name: Build Docker Image
      run: |
        docker build -t fastapi-app-test .

    # Run your application tests
    - name: Run Tests
      run: |
        docker run -d -p 8000:8000 --name test-container fastapi-app-test
        sleep 3
        curl --fail http://localhost:8000/ || exit 1