name: FastAPI CI Pipeline

# Trigger this workflow every time you push to the 'main' branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    # Run this on a clean virtual machine hosted by GitHub
    runs-on: ubuntu-latest

    steps:
    # Step 1: Download your code from GitHub into the virtual machine
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up Docker on the virtual machine
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Step 3: Build the Docker image (just like you did locally)
    - name: Build Docker Image
      run: |
        docker build -t fastapi-app-test .

    # Step 4: Run your tests inside the container
    - name: Run Tests
      run: |
        docker run -d -p 8000:8000 --name test-container fastapi-app-test
        sleep 3
        curl --fail http://localhost:8000/ || exit 1